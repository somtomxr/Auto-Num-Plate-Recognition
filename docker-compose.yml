version: "3.9"

services:

  # ── Streamlit Web App ─────────────────────────────────────────────────────
  streamlit:
    build: .
    container_name: anpr_streamlit
    ports:
      - "8501:8501"       # Open http://localhost:8501
    volumes:
      - ./best.pt:/app/best.pt:ro          # mount model weights (read-only)
      - ./evaluation:/app/evaluation       # persist benchmark outputs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    command: >
      streamlit run app.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true

  # ── FastAPI REST API ──────────────────────────────────────────────────────
  api:
    build: .
    container_name: anpr_api
    ports:
      - "8000:8000"       # Open http://localhost:8000/docs
    volumes:
      - ./best.pt:/app/best.pt:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    command: uvicorn api:app --host 0.0.0.0 --port 8000
